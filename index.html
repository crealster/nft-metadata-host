<!DOCTYPE html>
<html>
<head>
    <!-- Prevent caching so it always picks a fresh random link -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <script>
        // List your 5 links here
        const links = [
            "https://www.youtube.com/watch?v=8Ms3mJFkSeg&list=PLWmVt_rgUljE8rhnsS8Hn70oAhwldkGi2&index=1",
            "https://www.youtube.com/watch?v=7e72sMIsKdg&list=PLWmVt_rgUljE8rhnsS8Hn70oAhwldkGi2&index=2",
            "https://www.youtube.com/watch?v=8Ms3mJFkSeg&list=PLWmVt_rgUljE8rhnsS8Hn70oAhwldkGi2&index=3",
            "https://www.youtube.com/watch?v=8Ms3mJFkSeg&list=PLWmVt_rgUljE8rhnsS8Hn70oAhwldkGi2&index=4",
            "https://www.youtube.com/watch?v=8Ms3mJFkSeg&list=PLWmVt_rgUljE8rhnsS8Hn70oAhwldkGi2&index=5"
        ];

        // This picks a random link from the list
        const randomLink = links[Math.floor(Math.random() * links.length)];
        
        // Redirect the user
        window.location.href = randomLink;
    </script>
</head>
<body>
    <p>Redirecting you to a random destination...</p>
</body>
</html>
